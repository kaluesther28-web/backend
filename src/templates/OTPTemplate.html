<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoWell OTP</title>
</head>
<body style="margin:0;padding:0;background:#0d0d0d;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0d0d0d;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background:#1a1a1a;border-radius:16px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background:#000;padding:28px 32px;text-align:center;">
              <div style="display:inline-block;background:#00C853;width:48px;height:48px;border-radius:50%;line-height:48px;font-size:22px;margin-bottom:12px;">🔧</div>
              <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:800;letter-spacing:-0.5px;">GoWell</h1>
              <p style="margin:4px 0 0;color:#999;font-size:13px;">Help is always nearby</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              <p style="color:#ccc;font-size:15px;margin:0 0 8px;">Hi {{firstName}},</p>
              <p style="color:#999;font-size:14px;margin:0 0 24px;line-height:1.6;">
                {{message}}
              </p>
              <!-- OTP Box -->
              <div style="background:#000;border-radius:12px;padding:24px;text-align:center;margin-bottom:24px;">
                <p style="color:#999;font-size:12px;font-weight:600;letter-spacing:1px;margin:0 0 8px;text-transform:uppercase;">Your OTP Code</p>
                <div style="color:#00C853;font-size:36px;font-weight:800;letter-spacing:8px;">{{otp}}</div>
                <p style="color:#555;font-size:12px;margin:8px 0 0;">Expires in 5 minutes</p>
              </div>
              <p style="color:#666;font-size:13px;margin:0;line-height:1.6;">
                If you did not request this, please ignore this email. Do not share this code with anyone.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background:#111;padding:20px 32px;text-align:center;border-top:1px solid #222;">
              <p style="color:#555;font-size:12px;margin:0;">© 2025 GoWell Solutions. Lagos, Nigeria.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
